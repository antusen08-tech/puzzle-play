<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="description"
    content="A beautiful jigsaw puzzle game you can play on your phone. Choose any grid size and solve stunning puzzles with touch controls.">
  <title>Puzzle Play — Jigsaw Puzzle Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- ═══════════════ MENU SCREEN ═══════════════ -->
  <div id="menu-screen" class="screen active">
    <div class="menu-bg"></div>
    <div class="menu-content">
      <div class="logo-container">
        <div class="logo-icon">🧩</div>
        <h1 class="logo-title">Puzzle<span class="logo-accent">Play</span></h1>
        <p class="logo-subtitle">Touch. Solve. Enjoy.</p>
      </div>

      <div class="card settings-card">
        <div class="setting-group">
          <label class="setting-label">
            <span class="setting-label-text">Puzzle Size</span>
            <span class="setting-value" id="size-display">4 × 4</span>
          </label>
          <input type="range" id="size-slider" min="2" max="8" value="4" class="slider">
          <div class="slider-labels">
            <span>Easy</span>
            <span>Hard</span>
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">
            <span class="setting-label-text">Choose Image</span>
          </label>
          <div class="image-grid" id="image-grid">
            <!-- Filled by JS -->
          </div>
        </div>

        <div class="setting-group">
          <label class="setting-label">
            <span class="setting-label-text">Or Upload Your Own</span>
          </label>
          <label class="upload-btn" for="image-upload" id="upload-label">
            <span class="upload-icon">📷</span>
            <span>Tap to upload</span>
          </label>
          <input type="file" id="image-upload" accept="image/*" hidden>
        </div>
      </div>

      <button class="btn-primary" id="start-btn">
        <span class="btn-text">Start Puzzle</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
    <nav class="bottom-nav">
      <button class="nav-tab active" data-screen="menu-screen">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <span>Play</span>
      </button>
      <button class="nav-tab" data-screen="gallery-screen">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <span>Gallery</span>
      </button>
      <button class="nav-tab" data-screen="history-screen">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>History</span>
      </button>
    </nav>
  </div>

  <!-- ═══════════════ GALLERY SCREEN ═══════════════ -->
  <div id="gallery-screen" class="screen">
    <div class="menu-bg"></div>
    <div class="sub-screen-content">
      <div class="sub-header">
        <button class="btn-icon" id="gallery-back-btn" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h2 class="sub-title">My Images</h2>
        <label class="btn-icon" for="gallery-upload" aria-label="Upload image">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </label>
        <input type="file" id="gallery-upload" accept="image/*" multiple hidden>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <!-- Filled by JS -->
      </div>
      <div class="empty-state" id="gallery-empty">
        <div class="empty-icon">🖼️</div>
        <p class="empty-text">No images yet</p>
        <p class="empty-sub">Upload photos to use as puzzles</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════ HISTORY SCREEN ═══════════════ -->
  <div id="history-screen" class="screen">
    <div class="menu-bg"></div>
    <div class="sub-screen-content">
      <div class="sub-header">
        <button class="btn-icon" id="history-back-btn" aria-label="Back">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h2 class="sub-title">History</h2>
        <button class="btn-icon" id="clear-history-btn" aria-label="Clear history">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
      <div class="history-list" id="history-list">
        <!-- Filled by JS -->
      </div>
      <div class="empty-state" id="history-empty">
        <div class="empty-icon">🏆</div>
        <p class="empty-text">No puzzles completed yet</p>
        <p class="empty-sub">Solve a puzzle and it will appear here</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════ GAME SCREEN ═══════════════ -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="btn-icon" id="back-btn" aria-label="Back to menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="game-stats">
        <div class="stat">
          <span class="stat-icon">⏱</span>
          <span class="stat-value" id="timer">0:00</span>
        </div>
        <div class="stat">
          <span class="stat-icon">👆</span>
          <span class="stat-value" id="moves">0</span>
        </div>
      </div>
      <button class="btn-icon" id="hint-btn" aria-label="Show hint">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </button>
    </div>
    <div class="game-area" id="game-area">
      <canvas id="puzzle-canvas"></canvas>
    </div>
    <div class="game-footer">
      <button class="btn-secondary" id="shuffle-btn">
        <span>🔀</span> Shuffle
      </button>
      <button class="btn-secondary" id="preview-btn">
        <span>🖼</span> Preview
      </button>
    </div>
  </div>

  <!-- ═══════════════ WIN MODAL ═══════════════ -->
  <div id="win-overlay" class="overlay">
    <canvas id="confetti-canvas"></canvas>
    <div class="win-card">
      <div class="win-emoji">🎉</div>
      <h2 class="win-title">Puzzle Complete!</h2>
      <div class="win-stats">
        <div class="win-stat">
          <span class="win-stat-label">Time</span>
          <span class="win-stat-value" id="win-time">0:00</span>
        </div>
        <div class="win-stat">
          <span class="win-stat-label">Moves</span>
          <span class="win-stat-value" id="win-moves">0</span>
        </div>
      </div>
      <button class="btn-primary" id="play-again-btn">
        <span class="btn-text">Play Again</span>
        <span class="btn-arrow">→</span>
      </button>
      <button class="btn-ghost" id="menu-btn">Back to Menu</button>
    </div>
  </div>

  <!-- ═══════════════ PREVIEW MODAL ═══════════════ -->
  <div id="preview-overlay" class="overlay" style="display:none">
    <div class="preview-card">
      <img id="preview-image" src="" alt="Puzzle preview">
      <p class="preview-hint">Tap anywhere to close</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
